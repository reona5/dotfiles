
[env]
TERM = "xterm-256color"

[font]
size = 13.0

[font.bold]
family = "UDEV Gothic NF"
style = "Bold"

[font.italic]
family = "UDEV Gothic NF"
style = "Italic"

[font.normal]
family = "UDEV Gothic NF"
style = "Regular"

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\n" },
  { chars = "\u0011", key = "Q", mods = "Control" }
]

[terminal.shell]
args = ["-l", "-c", "herdr"]
program = "/bin/zsh"

[window]
startup_mode = "SimpleFullscreen"

[window.padding]
x = 8
y = 4

[general]
live_config_reload = true
import = ["~/.config/alacritty/catppuccin-mocha.toml"]
