# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

[plugins.zsh-defer]
github = 'romkatv/zsh-defer'

[plugins.zsh-completions]
github = 'zsh-users/zsh-completions'
apply = ['fpath']

[plugins.compinit]
inline = 'autoload -Uz compinit && compinit -C'

[plugins.colors]
inline = 'autoload -Uz colors && colors'

# zeno は source 時に deno cache / deno --version を実行して 1 秒以上かかるため、
# zsh-defer で初回プロンプト表示後に読み込む
[plugins.zeno]
github = 'yuki-yano/zeno.zsh'
apply = ['defer']

[plugins.zeno-bindings]
inline = '''
export ZENO_HOME="$HOME/.config/zeno"
export ZENO_ENABLE_SOCK=1
export ZENO_COMPLETION_FALLBACK=expand-or-complete

function zeno-ghq-cd-post-hook-impl() {
  # 旧実装は tmux セッションをリポジトリ名でリネームしていた。
  # herdr はワークスペースを cwd から自動でラベリングするため no-op とする。
  :
}

zle -N zeno-ghq-cd-post-hook zeno-ghq-cd-post-hook-impl

# zeno 本体が defer されるため、バインドも zsh-defer で同順に遅延して
# ZENO_LOADED が設定された後に実行する。
# ^r と ^i は従来どおり fzf のウィジェット (.fzf.zsh で設定) を使うため、
# ここでは束縛しない (遅延実行だと fzf を上書きしてしまうため)
function zeno-bindings-setup() {
  if [[ -n $ZENO_LOADED ]]; then
    bindkey ' '  zeno-auto-snippet
    bindkey '^m' zeno-auto-snippet-and-accept-line
    bindkey '^y' zeno-insert-snippet
    bindkey '^x '  zeno-insert-space
    bindkey '^x^m' accept-line
    bindkey '^x^z' zeno-toggle-auto-snippet
    bindkey '^xp' zeno-preprompt
    bindkey '^xs' zeno-preprompt-snippet
  fi
}
zsh-defer zeno-bindings-setup
'''
# -----------------------

[plugins.zsh-autosuggestions]
github = 'zsh-users/zsh-autosuggestions'
apply = ['defer']

[plugins.dotfiles-sync]
local = '~/.zsh'
use = ['*.zsh']
apply = ['source']

[plugins.zsh-syntax-highlighting]
github = 'zsh-users/zsh-syntax-highlighting'
apply = ['source']

# Some ZLE widgets (including zeno widgets) temporarily shadow zsh's special
# `options` associative array. Skip that single redraw so
# zsh-syntax-highlighting does not try to copy the shadowing scalar as pairs.
# The next redraw runs normally after the widget has returned.
[plugins.zsh-syntax-highlighting-zle-compat]
inline = '''
functions[_zsh_highlight_impl]=$functions[_zsh_highlight]
function _zsh_highlight() {
  local ret=$?
  if [[ ${parameters[options]-} != *association* ]]; then
    return $ret
  fi
  _zsh_highlight_impl "$@"
  return $ret
}
'''

[templates]
defer = "{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}"
