snippets:
  - name: Global rg
    keyword: "@g"
    snippet: "| rg"
    context:
      lbuffer: '.+\s'
  - name: Global less
    keyword: "@l"
    snippet: "| less"
    context:
      lbuffer: '.+\s'
  - name: Global force with lease
    keyword: "@f"
    snippet: "--force-with-lease --force-if-includes"
    context:
      lbuffer: '.+\s'
  - name: docker compose
    keyword: dc
    snippet: docker compose
  - name: docker attach
    keyword: da
    snippet: docker attach
  - name: nvim
    keyword: vi
    snippet: nvim
  - name: vanish (Delete merged branches)
    keyword: vanish
    snippet: 'git branch | grep -v "main" | grep -v "develop" | xargs git branch -D'
