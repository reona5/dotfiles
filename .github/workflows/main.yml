name: install

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # mise（検証の実行主体）と shellcheck（install.sh の静的解析）を用意する
      - name: Install mise and shellcheck
        run: brew install mise shellcheck

      # ローカルと同じ検証。install.sh の shellcheck と bootstrap 全体の dry-run。
      # package トークンの解決・dotfiles の source 存在・defaults の妥当性などを
      # 一括で検証し、不正があれば非ゼロで落ちる。
      - name: Verify config
        run: |
          mise trust
          mise run verify

      # 使い捨てランナー上で、破壊しても安全なセクションだけ実際に適用し、
      # dry-run では分からない実行時の成否まで確認する（casks/mas/tools は
      # ランナー上での導入が重い・不安定なため対象外）。
      - name: Exercise safe apply (fresh runner)
        run: |
          mise bootstrap -y --only dotfiles
          mise bootstrap -y --only macos
